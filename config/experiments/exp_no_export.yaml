experiment:
  name: bert_int_no_export
  dataset:
    name: D_W_15K_V1
    reader: hybea
    subtype: attribute_data
    # Configurazione writer con flag per disabilitare esportazione
    writer:
      type: hybea
      write_reduced: false      # Disabilita esportazione dataset ridotto
      write_augmented: true     # Mantiene esportazione dataset augmentato
      write_results: true       # Mantiene esportazione risultati
  reduction_ratio: 0.1
  model: bert_int
  seed: 11037