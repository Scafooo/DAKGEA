experiment:
  suite: forget_labels_bert_int
  name: BBC_DB_forget_1.0_0.5
  dataset:
    name: openea/BBC_DB
    writer: bert_int
  reduction:
    method: forget_labels
    ratio: 1.0
    writer: bert_int
    eval: true
    save_dataset: false
    save_model: false
  augmentation:
    method: plm
    ratio: 0.5
    writer:
      type: bert_int
      augmented_only_train: true
    eval: true
    save_dataset: false
    save_model: false
  model: bert_int
  seed: 11037
  clear: true
  overwrite_existing: false
