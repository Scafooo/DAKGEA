experiment:
  suite: flan_t5_bert_int
  name: ICEWS_YAGO_07_03
  dataset:
    name: openea/ICEW_YAGO
    writer: bert_int
  reduction:
    method: forget_labels
    ratio: 0.7
    writer: bert_int
    eval: true
    save_dataset: false
    save_model: false
  augmentation:
    method: plm_mixup
    ratio: 0.3
