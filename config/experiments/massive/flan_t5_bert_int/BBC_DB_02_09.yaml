experiment:
  suite: flan_t5_bert_int
  name: BBC_DB_02_09
  dataset:
    name: openea/BBC_DB
    writer: bert_int
  reduction:
    method: forget_labels
    ratio: 0.2
    writer: bert_int
    eval: true
    save_dataset: false
    save_model: false
  augmentation:
    method: plm_mixup
    ratio: 0.9
    backbone: flan-t5-xl
    pretrained_model_dir: models/pretrained_plm/BBC_DB
    writer:
      type: bert_int
      augmented_only_train: true
    eval: true
    save_dataset: false
    save_model: false
  model: bert_int
  seed: 11037
  clear: true
  overwrite_existing: false
