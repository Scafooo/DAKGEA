experiment:
  suite: massive_aug_red_bert_int_only_train
  name: BBC_DB_02_01
  dataset:
    name: openea/BBC_DB
    writer: bert_int
  reduction:
    method: random_entities
    ratio: 0.2
    writer: bert_int
    eval: true
    save_dataset: false
    save_model: false
  augmentation:
    method: plm
    ratio: 0.1
    writer:
      type: bert_int
      augmented_only_train: true
    eval: true
    save_dataset: false
    save_model: false
    eval_on_reduction: true
  model: bert_int
  seed: 11037
  clear: true
  overwrite_existing: false
