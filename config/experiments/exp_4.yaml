experiment:
  name: "bert_int_smoke"
  overwrite_existing: true

  writers:
    - type: "hybea"
      write_reduced: true
      write_augmented: false
      write_results: true

  datasets:
    - name: "D_W_15K_V1"
      reader: "hybea"

  reduction_method: "random_entities"
  reduction_ratios: [0.1]
  augmentation_methods: []
  models_to_run:
    - "bert_int"

  parameters:
    experiment:
      seed: 42
    reduction:
      random_seed: 42
      filter_alignment: true
    models:
      bert_int:
        device: "cuda"
        basic_unit:
          epochs: 1
          batch_size: 6
          max_seq_length: 64
          negatives: 1
          candidate_topk: 32
        interaction:
          epochs: 1
          batch_size: 64
          neighbor_max: 25
          attribute_max: 25
          candidate_topk: 32
