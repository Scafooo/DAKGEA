# ============================================================================
# BERT-INT Experiment Template
# ============================================================================
#
# BERT-INT is a two-phase entity alignment model:
#   Phase 1 (basic_unit):     BERT fine-tuning for entity embeddings
#   Phase 2 (interaction_model): Multi-view features + MLP for alignment
#
# All default parameters are defined in config/models/bert_int.yaml
# Only specify parameters here that you want to override
#
# ============================================================================

experiment:
  name: bert_int_custom           # Your experiment name
  dataset:
    name: D_W_15K_V1              # Dataset name
    reader: hybea                 # Dataset reader
    subtype: attribute_data       # Dataset subtype
  reduction_ratio: 0.1            # Entity reduction ratio (0.1 = 10%)
  writer: hybea                   # Dataset writer
  model: bert_int                 # Model type (triggers two-phase execution)
  seed: 11037                     # Random seed for reproducibility

  # ============================================================================
  # Optional: Override default parameters
  # ============================================================================
  # Defaults are in config/models/bert_int.yaml
  # Uncomment and modify only what you need to change

  # basic_unit:
  #   epochs: 20                  # Default: 20
  #   batch_size: 256             # Default: 256
  #   learning_rate: 5e-05        # Default: 5e-05
  #   eval_frequency: 1           # Default: 1

  # interaction_model:
  #   epochs: 100                 # Default: 100
  #   batch_size: 256             # Default: 256
  #   learning_rate: 0.001        # Default: 0.001
  #   eval_every: 2               # Default: 2
