experiment:
  name: test_augmented_only_train
  dataset:
    name: openea/BBC_DB
    writer: bert_int
  reduction:
    method: random_entities
    ratio: 0.3
    writer: bert_int
    eval: false  # Skip reduction eval for faster test
    save_dataset: false  # Disable save to avoid cache issues
    save_model: false
  augmentation:
    method: plm
    ratio: 0.3
    writer:
      type: bert_int
      augmented_only_train: true  # Put all augmented entities in training set
    eval: true
    save_dataset: false  # Disable save to avoid cache issues
    save_model: false
  model: bert_int
  seed: 11037
  clear: true
  overwrite_existing: true
