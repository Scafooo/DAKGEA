experiment:
  name: test_augmented_only_train
  dataset:
    name: openea/D_W_15K_V1
    writer: bert_int
  reduction:
    method: random_entities
    ratio: 0.1
    writer: bert_int
    eval: true
    save_dataset: true
    save_model: false
  augmentation:
    method: plm
    ratio: 0.1
    writer:
      type: bert_int
      augmented_only_train: true  # Put all augmented entities in training set
    eval: true
    save_dataset: true
    save_model: false
  model: bert_int
  seed: 11037
  clear: true
  overwrite_existing: true
