experiment:
  name: test_bert_int_new_architecture
  dataset:
    name: D_W_15K_V1
    reader: hybea
    subtype: attribute_data
  reduction_ratio: 0.1
  reduction_method: random_entities
  writer: bert_int  # Use BERT-INT native format writer
  model: bert_int
  seed: 11037

  # Override per test rapido
  basic_unit:
    epochs: 2  # Ridotto per test veloce
    batch_size: 12
    learning_rate: 1e-05
    eval_frequency: 1

  interaction_model:
    epochs: 5  # Ridotto per test veloce
    batch_size: 128
    learning_rate: 0.0005
    eval_every: 1
