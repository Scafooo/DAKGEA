experiment:
  name: bert_int_test
  dataset:
    name: D_W_15K_V1
    reader: hybea
    subtype: attribute_data
  reduction_ratio: 0.1
  writer: hybea
  model: bert_int
  seed: 11037

  # REDUCED CONFIG FOR FAST TESTING
  # Override defaults from config/models/bert_int.yaml with minimal epochs

  basic_unit:
    epochs: 2  # Fast test: 2 epochs instead of default 20
    batch_size: 32  # Reduced for 7.6GB GPU
    eval_batch_size: 16  # Reduced for 7.6GB GPU
    candidate_batch_size: 16  # Reduced for 7.6GB GPU

  interaction_model:
    epochs: 5  # Fast test: 5 epochs instead of default 100
    eval_every: 2  # Evaluate every 2 epochs
    batch_size: 64  # Reduced for 7.6GB GPU
