# Statistics Module Configuration
# This file configures the experiments/statistics module for analyzing experiment results

# File names
files:
  results: "results.json"
  summary: "summary.json"
  metadata: "metadata.json"

# Experiment stages to analyze
stages:
  - "reduction"
  - "augmentation"

# Default metrics to analyze
# These can be overridden via command-line arguments
metrics:
  default:
    - "hits@1"
    - "hits@5"
    - "hits@10"
    - "hits@25"
    - "hits@50"
    - "mrr"
    - "mr"
    - "precision"
    - "recall"
    - "f-measure"

  # Metric groups (for organized visualization)
  groups:
    ranking:
      - "hits@1"
      - "hits@5"
      - "hits@10"
      - "hits@25"
      - "hits@50"
      - "mrr"
      - "mr"
    classification:
      - "precision"
      - "recall"
      - "f-measure"

  # Metrics to use for plots (organized by group)
  plot:
    ranking:
      - "hits@1"
      - "hits@10"
      - "mrr"
    classification:
      - "precision"
      - "recall"
      - "f-measure"

# Metric display colors for visualizations
colors:
  "hits@1": "#1f77b4"
  "hits@5": "#ff7f0e"
  "hits@10": "#2ca02c"
  "hits@25": "#d62728"
  "hits@50": "#9467bd"
  "mrr": "#8c564b"
  "mr": "#e377c2"
  "precision": "#17becf"
  "recall": "#bcbd22"
  "f-measure": "#7f7f7f"

# Plot settings
plots:
  dpi: 200                        # Default resolution for saved plots
  figure_size:
    default: [5, 4]               # Width, height in inches
    ratio_chart: [8, 5]           # For ratio comparison charts
    trend_chart: [8, 4.5]         # For trend line charts

  # Bar chart colors
  bar_colors:
    reduction: "#457b9d"          # Blue shade
    augmentation: "#e76f51"       # Red/orange shade

  # Ratio chart settings
  ratio_chart:
    bar_width: 0.35
    gap_between_metrics: 0.15
    gap_between_ratios: 0.8

# Export settings
export:
  # Available formats: tsv, csv, markdown, latex, excel
  default_formats:
    - "tsv"
    - "csv"

  # Output directories (relative to project root)
  output_dirs:
    plots: "results_analysis"     # Where to save plots
    plots_ranking: "results_analysis/ranking_metrics"  # Ranking metrics plots
    plots_classification: "results_analysis/classification_metrics"  # Classification metrics plots
    exports: "results_analysis"   # Where to save export files

# Advanced statistics
advanced_stats:
  enabled: false                  # Enable by default (can override with --advanced-stats)
  confidence_level: 0.95          # For confidence intervals
  effect_size_thresholds:
    small: 0.2
    medium: 0.5
    large: 0.8

# Advanced visualizations
advanced_plots:
  enabled: false                  # Enable by default (can override with --enable-advanced-plots)
  types:
    - "heatmap"
    - "boxplot"
    - "violin"
    - "scatter"
    - "delta_chart"

# Filtering
filtering:
  # Directories to skip when discovering experiments
  skip_directories:
    - "logs"
    - "statistics"

  # Normalized metrics (clamped to [0, 1] range)
  normalized_metrics:
    - "hits@1"
    - "hits@5"
    - "hits@10"
    - "hits@25"
    - "hits@50"
    - "mrr"
    - "precision"
    - "recall"
    - "f-measure"
