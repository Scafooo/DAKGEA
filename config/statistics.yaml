# Statistics Module Configuration
# This file configures the experiments/statistics module for analyzing experiment results

# File names
files:
  results: "results.json"
  summary: "summary.json"
  metadata: "metadata.json"

# Experiment stages to analyze
stages:
  - "reduction"
  - "augmentation"

# Default metrics to analyze
# These can be overridden via command-line arguments
# NOTE: precision, recall, and f-measure removed - they are aliases of hits@1 (bug in BERT-INT evaluator)
metrics:
  default:
    - "hits@1"
    - "hits@5"
    - "hits@10"
    - "hits@25"
    - "hits@50"
    - "mrr"
    - "mr"

  # Metric groups (for organized visualization)
  groups:
    ranking:
      - "hits@1"
      - "hits@5"
      - "hits@10"
      - "hits@25"
      - "hits@50"
      - "mrr"
      - "mr"

  # Metrics to use for plots (organized by group)
  plot:
    ranking:
      - "hits@1"
      - "hits@10"
      - "mrr"

# Metric display colors for visualizations
colors:
  "hits@1": "#1f77b4"        # Blue
  "hits@5": "#ff7f0e"        # Orange
  "hits@10": "#2ca02c"       # Green
  "hits@25": "#d62728"       # Red
  "hits@50": "#9467bd"       # Purple
  "mrr": "#8c564b"           # Brown
  "mr": "#e377c2"            # Pink

# Plot settings
plots:
  dpi: 200                        # Default resolution for saved plots
  figure_size:
    default: [5, 4]               # Width, height in inches
    ratio_chart: [8, 5]           # For ratio comparison charts
    trend_chart: [8, 4.5]         # For trend line charts
    radar_chart: [7, 7]           # For radar/spider charts (square)
    ridge_plot: [10, 6]           # For ridge plots
    performance_matrix: [10, 8]   # For dataset x model heatmaps

  # Unified color scheme for reduction/augmentation across ALL plots
  stage_colors:
    reduction:
      primary: "#264653"          # Dark blue-green (primary)
      light: "#2a9d8f"           # Light teal (accents)
      linestyle: "--"             # Dashed line
      marker: "x"                 # X marker
      alpha: 0.85                 # Transparency
    augmentation:
      primary: "#e76f51"          # Warm orange/red (primary)
      light: "#f4a261"            # Light orange (accents)
      linestyle: "-"              # Solid line
      marker: "o"                 # Circle marker
      alpha: 0.85                 # Transparency

  # Delta/improvement colors (for comparison charts)
  delta_colors:
    positive: "#2a9d8f"           # Teal green (improvement)
    negative: "#e63946"           # Red (degradation)
    neutral: "#6c757d"            # Gray (no change)

  # Ratio chart settings
  ratio_chart:
    bar_width: 0.35
    gap_between_metrics: 0.15
    gap_between_ratios: 0.8

# Export settings
export:
  # Available formats: tsv only (as requested)
  default_formats:
    - "tsv"

  # Output directories (relative to project root)
  output_dirs:
    plots: "results/statistics"     # Where to save plots
    plots_ranking: "results/statistics/ranking_metrics"  # Ranking metrics plots
    exports: "results/statistics"   # Where to save export files

# Advanced statistics
advanced_stats:
  enabled: false                  # Enable by default (can override with --advanced-stats)
  confidence_level: 0.95          # For confidence intervals
  effect_size_thresholds:
    small: 0.2
    medium: 0.5
    large: 0.8

# Advanced visualizations
advanced_plots:
  enabled: false                  # Enable by default (can override with --enable-advanced-plots)
  types:
    - "heatmap"
    - "boxplot"
    - "violin"
    - "scatter"
    - "delta_chart"
    - "radar_chart"             # NEW: Multi-metric radar/spider chart
    - "ridge_plot"              # NEW: Distribution ridge plot
    - "performance_matrix"      # NEW: Dataset × Model heatmap

# Console output settings (using rich library)
console:
  # Enable colored output with rich
  use_rich: true

  # Show progress bars during analysis
  show_progress: true

  # Color scheme for console output
  colors:
    improvement: "green"          # Positive delta
    degradation: "red"            # Negative delta
    neutral: "yellow"             # No significant change
    header: "cyan bold"           # Section headers
    dataset: "blue bold"          # Dataset names
    metric: "white"               # Metric names
    value: "white"                # Metric values

  # Thresholds for delta highlighting
  delta_thresholds:
    significant_improvement: 0.05    # >= 5% improvement
    significant_degradation: -0.05   # <= -5% degradation

  # Summary table settings
  summary_table:
    show: true                    # Show summary table at end
    top_n: 5                      # Show top N best/worst experiments
    sort_by: "hits@1"             # Metric to sort by

# Outlier detection
outliers:
  enabled: true                   # Enable automatic outlier detection
  method: "iqr"                   # Method: "iqr" (interquartile range) or "zscore"
  iqr_multiplier: 1.5             # IQR multiplier for outlier detection
  zscore_threshold: 3.0           # Z-score threshold for outlier detection
  highlight_in_plots: true        # Mark outliers on plots

# Best/worst experiment tracking
tracking:
  enabled: true                   # Enable best/worst experiment identification
  criteria:
    - metric: "hits@1"
      maximize: true              # Higher is better
    - metric: "mrr"
      maximize: true
    - metric: "mr"
      maximize: false             # Lower is better
  save_summary: true              # Save best/worst to separate file

# Filtering
filtering:
  # Directories to skip when discovering experiments
  skip_directories:
    - "logs"
    - "statistics"

  # Normalized metrics (clamped to [0, 1] range)
  normalized_metrics:
    - "hits@1"
    - "hits@5"
    - "hits@10"
    - "hits@25"
    - "hits@50"
    - "mrr"
