paths:
  raw_data: data/raw
  external_data: data/external
  results: results
  statistics: results/statistics
  log_file: results/logs/log.txt

logging:
  level: INFO

# Reproducibility settings
reproducibility:
  deterministic: true  # Enable deterministic mode for reproducible results
                       # Note: Enabling this may reduce performance by ~10-20%
                       # but ensures identical results across runs with same seed

# Baseline evaluation cache
# Caches baseline (reduction-only) evaluation results to avoid redundant computation
# when running multiple augmentation experiments with the same reduction ratio.
baseline_cache:
  enabled: true  # Set to false to disable caching

