model:
  device: "cuda"
  paths:
    cache_dir: "results/cache/bert_int"

  basic_unit:
    encoder_name: "bert-base-multilingual-cased"
    max_seq_length: 128
    dropout: 0.1
    learning_rate: 5.0e-5
    weight_decay: 0.01
    epochs: 3
    batch_size: 16
    gradient_accumulation: 1
    load_pretrained: true
    warmup_steps: 100
    max_grad_norm: 1.0
    train_ratio: 0.8
    negatives_per_positive: 1
    margin: 1.0
    eval_batch_size: 128

  interaction:
    batch_size: 64
    cosine_top_k: 50
    temperature: 0.1

  seed:
    global: 42
