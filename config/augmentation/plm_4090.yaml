# PLM Augmentation Configuration - RTX 4090 Optimized (24GB VRAM)
# This configuration leverages the full power of RTX 4090 for best quality results
#
# Hardware: RTX 4090 (24GB VRAM)
# Model: BART-large (406M parameters)
# Expected training time: ~30-45 minutes (vs ~15 min on 8GB GPU)

augmentation:
  # Augmentation method name (must match registry)
  method: plm

  # BFS expansion parameters
  max_depth: 2                    # Maximum BFS depth for expansion
  ratio: 0.5                      # Augmentation ratio (0.5 = 50% more entities)
  max_pairs: null                 # Absolute maximum pairs (null = use ratio)

  # Provenance tracking
  add_derived_predicate: false    # Add derivedFrom triples for lineage tracking
  derived_predicate: "http://dakgea.org/augmentation/derivedFrom"

  # Value consistency - ensures consistent variations for duplicate values
  value_consistency:
    intra_node:
      enabled: true               # Maintain consistency within same augmented node
      selection: "first"          # "first" | "random" | "best" - which variation to use
    inter_node:
      enabled: true               # Maintain consistency across augmented nodes
      scope: "alignment_pair"     # "alignment_pair" | "expansion_cluster" | "global"

  # BART fine-tuning configuration - RTX 4090 OPTIMIZED
  bart:
    enable_finetuning: true       # Enable BART fine-tuning
    model_name: "facebook/bart-large"  # BART-LARGE for maximum quality (406M params)
    out_dir: "./bart_plm_model_large"  # Output directory for fine-tuned model
    epochs: 15                    # More epochs for better convergence (4090 can handle it)
    batch_size: 32                # Large batch size for stable gradients (24GB VRAM!)
    learning_rate: 3.0e-5         # Lower LR for BART-large (more stable)
    force_retrain: false          # Force retraining even if model exists
    max_train_samples: null       # Use ALL training samples (no limit)
    val_split: 0.1                # Validation split ratio
    patience: 5                   # Higher patience for BART-large (needs more time)
    max_per_predicate: null       # No limit on examples per predicate

    # Regularization (prevent overfitting)
    weight_decay: 0.01            # L2 regularization weight
    warmup_steps: 500             # More warmup steps for large batch size
    max_grad_norm: 1.0            # Gradient clipping threshold

    # BART interpolation parameters
    base_alpha: 0.5               # Base interpolation alpha (0.5 = balanced mixing)
    alpha_spread: 0.45            # Alpha variation range (optimal from noise tuning)
    max_len_in: 128               # Increased input length (4090 can handle it)
    max_len_out: 64               # Increased output length

    # Generation parameters (OPTIMAL TUNED VALUES - adjusted for BART-large)
    generation:
      max_new_tokens: 48          # Increased from 32 (BART-large can generate longer)
      do_sample: true             # Enable sampling
      top_k: 0                    # Top-k sampling (0 = disabled, use top_p)
      top_p: 0.9                  # Nucleus sampling (optimal from tuning)
      temperature: 1.0            # Sampling temperature (optimal from tuning)
      num_beams: 4                # Increased beams for better quality (from 2)
      repetition_penalty: 1.7     # Repetition penalty (optimal from tuning)
      length_penalty: 1.0         # Length penalty (neutral)
      no_repeat_ngram_size: 3     # N-gram blocking (optimal from tuning)

      # Noise injection (optimal from tuning)
      enable_noise_injection: true  # Enable noise injection
      noise_std: 0.18             # Slightly lower for BART-large (stronger model needs less noise)
      noise_apply_when: "identical_inputs"  # "identical_inputs" or "always"

    # Semantic predicate matching configuration
    predicate_matching:
      embedding_model: "all-MiniLM-L6-v2"  # Sentence transformer model
      similarity_threshold: 0.6    # Minimum similarity for match [0-1]
      cache_dir: ".cache/embeddings"  # Cache directory for embeddings
      device: null                 # "cuda", "cpu", or null (auto-detect)

      # Hybrid matching (name + value similarity)
      use_value_similarity: true   # Enable value-based matching
      name_weight: 0.85            # Weight for semantic name similarity (85%)
      value_weight: 0.15           # Weight for value similarity (15%)
      alignment_sample_size: 200   # Increased sample size (4090 can handle it)

    # Unmatched attributes generation
    generate_unmatched: true       # Generate variations for non-matching attributes
    unmatched_sample_rate: 1.0     # Sample 100% of unmatched attrs (0.0-1.0, 1.0=all)

    # Advanced training techniques (can be enabled on 4090)
    advanced_training:
      # Stratified sampling: balance predicate distribution
      stratified_sampling:
        enable: false             # Can enable for better balance
        min_samples_per_predicate: 10
        max_samples_per_predicate: 10000  # Increased limit
        balancing_strategy: "sqrt"  # "uniform", "sqrt", "log"

      # Contrastive learning: learn from negative examples
      contrastive_learning:
        enable: false             # Can enable for better quality
        num_negatives: 5          # More negatives on 4090
        contrastive_weight: 0.3   # Weight of contrastive loss
        temperature: 0.07         # Temperature for contrastive loss
        negative_strategy: "same_predicate"

      # Multi-task learning: auxiliary prediction tasks
      multi_task_learning:
        enable: false
        predict_attribute_type: true
        predict_predicate_match: true
        auxiliary_weight: 0.2

      # Advanced noising: better corruption strategies
      advanced_noising:
        enable: false
        span_corruption_ratio: 0.3
        mean_span_length: 3
        entity_aware_masking: true
        entity_mask_prob: 0.5

      # Curriculum learning: easy to hard examples
      curriculum_learning:
        enable: false
        strategy: "length"
        num_phases: 3
        phase_epochs: [5, 5, 5]   # Adjusted for 15 epochs

      # Data augmentation for training: synthetic variations
      training_augmentation:
        enable: true              # Enable training data augmentation
        synonym_replacement: false
        back_translation: false
        random_noise: true        # Character-level noise
        augmentation_ratio: 0.3   # 30% more samples with noise
