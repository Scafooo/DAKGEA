# PLM Augmentation - Advanced Training Configuration
# This config enables all advanced training techniques for better BART fine-tuning

augmentation:
  method: plm_augmentation
  max_depth: 2
  ratio: 0.5
  max_pairs: null
  add_derived_predicate: false

  bart:
    enable_finetuning: true
    model_name: "facebook/bart-base"
    out_dir: "./bart_plm_model"
    epochs: 10
    batch_size: 16
    learning_rate: 5.0e-5
    force_retrain: false
    max_train_samples: 4000
    val_split: 0.1
    patience: 3
    max_per_predicate: 5000

    # BART interpolation parameters
    base_alpha: 0.35
    alpha_spread: 0.25
    max_len_in: 96
    max_len_out: 48

    # Generation parameters
    generation:
      max_new_tokens: 32
      do_sample: true
      top_k: 50
      top_p: 0.95
      temperature: 1.2
      num_beams: 1
      repetition_penalty: 2.0
      length_penalty: 1.0
      no_repeat_ngram_size: 4

    # Advanced training techniques (ALL ENABLED)
    advanced_training:
      # Stratified sampling: balance predicate distribution
      stratified_sampling:
        enable: true              # ENABLED
        min_samples_per_predicate: 10
        max_samples_per_predicate: 1000
        balancing_strategy: "sqrt"  # "uniform", "sqrt", "log"

      # Contrastive learning: learn from negative examples
      contrastive_learning:
        enable: false             # DISABLED (requires custom trainer - future work)
        num_negatives: 3
        contrastive_weight: 0.3
        temperature: 0.07
        negative_strategy: "same_predicate"

      # Multi-task learning: auxiliary prediction tasks
      multi_task_learning:
        enable: false             # DISABLED (requires custom trainer - future work)
        predict_attribute_type: true
        predict_predicate_match: true
        auxiliary_weight: 0.2

      # Advanced noising: better corruption strategies
      advanced_noising:
        enable: true              # ENABLED
        span_corruption_ratio: 0.3
        mean_span_length: 3
        entity_aware_masking: true
        entity_mask_prob: 0.5

      # Curriculum learning: easy to hard examples
      curriculum_learning:
        enable: false             # DISABLED (requires custom trainer - future work)
        strategy: "length"
        num_phases: 3
        phase_epochs: [3, 3, 4]

      # Data augmentation for training: synthetic variations
      training_augmentation:
        enable: false             # DISABLED (not yet implemented)
        synonym_replacement: false
        back_translation: false
        random_noise: false
        augmentation_ratio: 0.3

    # Semantic predicate matching
    predicate_matching:
      embedding_model: "all-MiniLM-L6-v2"
      similarity_threshold: 0.7
      cache_dir: ".cache/embeddings"
