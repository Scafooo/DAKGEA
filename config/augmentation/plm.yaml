# PLM Augmentation Configuration
# This file contains the default configuration for PLM-based augmentation

augmentation:
  # Augmentation method name (must match registry)
  method: plm

  # BFS expansion parameters
  max_depth: 2                    # Maximum BFS depth for expansion
  ratio: 0.5                      # Augmentation ratio (0.5 = 50% more entities)
  max_pairs: null                 # Absolute maximum pairs (null = use ratio)

  # Provenance tracking
  add_derived_predicate: false    # Add derivedFrom triples for lineage tracking
  derived_predicate: "http://dakgea.org/augmentation/derivedFrom"

  # BART fine-tuning configuration
  bart:
    enable_finetuning: false      # Enable BART fine-tuning
    model_name: "facebook/bart-base"  # BART model to use
    out_dir: "./bart_plm_model"   # Output directory for fine-tuned model
    epochs: 10                    # Number of training epochs
    batch_size: 16                # Training batch size
    learning_rate: 5.0e-5         # Learning rate
    force_retrain: false          # Force retraining even if model exists
    max_train_samples: 4000       # Maximum training samples (null = unlimited)
    val_split: 0.1                # Validation split ratio
    patience: 3                   # Early stopping patience (stop if no improvement)
    max_per_predicate: 5000       # Max examples per predicate

    # Regularization (prevent overfitting)
    weight_decay: 0.01            # L2 regularization weight
    warmup_steps: 100             # Learning rate warmup steps
    max_grad_norm: 1.0            # Gradient clipping threshold

    # BART interpolation parameters
    base_alpha: 0.35              # Base interpolation alpha
    alpha_spread: 0.25            # Alpha variation range
    max_len_in: 96                # Max input token length
    max_len_out: 48               # Max output token length

    # Generation parameters
    generation:
      max_new_tokens: 32          # Max tokens to generate
      do_sample: true             # Enable sampling
      top_k: 50                   # Top-k sampling
      top_p: 0.95                 # Nucleus sampling threshold
      temperature: 1.2            # Sampling temperature
      num_beams: 1                # Number of beams (1 = no beam search)
      repetition_penalty: 2.0     # Penalize repetitions
      length_penalty: 1.0         # Length penalty
      no_repeat_ngram_size: 4     # Prevent n-gram repetition

    # Semantic predicate matching configuration
    predicate_matching:
      embedding_model: "all-MiniLM-L6-v2"  # Sentence transformer model
      similarity_threshold: 0.6    # Minimum similarity for match [0-1]
      cache_dir: ".cache/embeddings"  # Cache directory for embeddings
      device: null                 # "cuda", "cpu", or null (auto-detect)

      # Hybrid matching (name + value similarity)
      use_value_similarity: true   # Enable value-based matching
      name_weight: 0.85            # Weight for semantic name similarity (85%)
      value_weight: 0.15           # Weight for value similarity (15%)
      alignment_sample_size: 100   # Entities to sample for pre-computation

    # Unmatched attributes generation (NEW!)
    generate_unmatched: true       # Generate variations for non-matching attributes
    unmatched_sample_rate: 1.0     # Sample 100% of unmatched attrs (0.0-1.0, 1.0=all)

    # Advanced training techniques (modular - can be toggled on/off)
    advanced_training:
      # Stratified sampling: balance predicate distribution
      stratified_sampling:
        enable: false             # Enable stratified sampling
        min_samples_per_predicate: 10  # Minimum samples per predicate
        max_samples_per_predicate: 1000  # Maximum samples per predicate
        balancing_strategy: "sqrt"  # "uniform", "sqrt", "log"

      # Contrastive learning: learn from negative examples
      contrastive_learning:
        enable: false             # Enable contrastive learning
        num_negatives: 3          # Number of hard negatives per positive
        contrastive_weight: 0.3   # Weight of contrastive loss (vs reconstruction)
        temperature: 0.07         # Temperature for contrastive loss
        negative_strategy: "same_predicate"  # "same_predicate", "same_type", "random"

      # Multi-task learning: auxiliary prediction tasks
      multi_task_learning:
        enable: false             # Enable multi-task learning
        predict_attribute_type: true   # Predict attribute type (name, date, etc.)
        predict_predicate_match: true  # Predict if values share predicate
        auxiliary_weight: 0.2     # Weight of auxiliary losses

      # Advanced noising: better corruption strategies
      advanced_noising:
        enable: false             # Enable advanced noising
        span_corruption_ratio: 0.3  # Ratio of spans to corrupt
        mean_span_length: 3       # Average span length to mask
        entity_aware_masking: true  # Mask named entities with higher probability
        entity_mask_prob: 0.5     # Probability of masking detected entities

      # Curriculum learning: easy to hard examples
      curriculum_learning:
        enable: false             # Enable curriculum learning
        strategy: "length"        # "length", "predicate_frequency", "custom"
        num_phases: 3             # Number of curriculum phases
        phase_epochs: [3, 3, 4]   # Epochs per phase (must sum to total epochs)

      # Data augmentation for training: synthetic variations
      training_augmentation:
        enable: false             # Enable training data augmentation
        synonym_replacement: false  # Replace words with synonyms
        back_translation: false   # Use back-translation
        random_noise: false       # Add random character noise
        augmentation_ratio: 0.3   # Ratio of augmented samples to add
