# PLM Augmentation Configuration - NO FINE-TUNING
# Quick test configuration without BART fine-tuning

augmentation:
  method: plm
  max_depth: 1                    # Reduced depth for faster testing
  ratio: 0.1
  add_derived_predicate: false

  bart:
    enable_finetuning: false      # DISABLED for fast testing
    model_name: "facebook/bart-base"

    # BART interpolation parameters
    base_alpha: 0.35
    alpha_spread: 0.25
    max_len_in: 96
    max_len_out: 48

    generation:
      max_new_tokens: 32
      do_sample: true
      top_k: 50
      top_p: 0.95
      temperature: 1.2
      num_beams: 1
      repetition_penalty: 2.0
      length_penalty: 1.0
      no_repeat_ngram_size: 4

    predicate_matching:
      embedding_model: "all-MiniLM-L6-v2"
      similarity_threshold: 0.6
      cache_dir: ".cache/embeddings"
      device: null
      use_value_similarity: true
      name_weight: 0.85
      value_weight: 0.15
      alignment_sample_size: 100

    generate_unmatched: true
    unmatched_sample_rate: 1.0

    advanced_training:
      stratified_sampling:
        enable: false
      contrastive_learning:
        enable: false
      multi_task_learning:
        enable: false
      advanced_noising:
        enable: false
      curriculum_learning:
        enable: false
      training_augmentation:
        enable: false
